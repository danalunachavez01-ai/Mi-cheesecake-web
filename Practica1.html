<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tarjeta Divinaa.</title>
  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 300px;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    h6 {
      color: #2a5298;
      font-size: 18px;
    }

    button {
      background: #2a5298;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #1e3c72;
    }
  </style>
</head>
<body>

  <div class="card">
    <h6>Holaaa, es mi practicaaa.</h6>
    <p>Estoy dominando el HTML como una diosa del código osi.</p>
    <button onclick="alert('Sigue practicando, crack ✨')">Haz clic</button>
  </div>

</body>
</html>
